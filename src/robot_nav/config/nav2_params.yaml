#Adopted from https://github.com/ros-navigation/navigation2/blob/ebe60dcab83d4f736629287d7530fea86806a384/nav2_bringup/params/nav2_params.yaml
#  This file was copied from elsehwere, it needs to be tuned to match our requirements. 

coverage_server:
  ros__parameters:
    use_sim_time: True
    robot_width: 1.841
    operation_width: 1.8
    default_headland_width: 0.6
    min_turning_radius: 0.4
    # default_turn_point_distance: 0.03
    linear_curv_change: 2.5
    coordinates_in_cartesian_frame: true
    default_allow_overlap: true

    default_swath_angle_type: "SET_ANGLE"
    default_swath_angle: 1.57
    default_swath_type: "LENGTH"

    default_path_type: "REEDS_SHEPP"
    default_path_continuity_type: "DISCONTINUOUS"

bt_navigator:
  ros__parameters:
    bt_loop_duration: 20 #ms
    default_server_timeout: 20 # ms
    wait_for_service_timeout: 1000 # ms
    action_server_result_timeout: 300 # s
    transform_tolerance: 0.2 # s
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom
    use_sim_time: True
    bond_heartbeat_period: 0.2
    # 'default_nav_through_poses_bt_xml' and 'default_nav_to_pose_bt_xml' are use defaults:
    # nav2_bt_navigator/navigate_to_pose_w_replanning_and_recovery.xml
    # nav2_bt_navigator/navigate_through_poses_w_replanning_and_recovery.xml
    # They can be set here or via a RewrittenYaml remap from a parent launch file to Nav2.

    # Coverage navigator configuration
    navigators: ['navigate_complete_coverage']
    navigate_complete_coverage:
      plugin: "opennav_coverage_navigator/CoverageNavigator"
    error_code_names: ["compute_path_error_code", "follow_path_error_code", "compute_coverage_error_code"]

    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_compute_path_through_poses_action_bt_node
      - nav2_smooth_path_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_spin_action_bt_node
      - nav2_wait_action_bt_node
      - nav2_assisted_teleop_action_bt_node
      - nav2_back_up_action_bt_node
      - nav2_drive_on_heading_bt_node
      - nav2_clear_costmap_service_bt_node
      - nav2_is_stuck_condition_bt_node
      - nav2_goal_reached_condition_bt_node
      - nav2_goal_updated_condition_bt_node
      - nav2_globally_updated_goal_condition_bt_node
      - nav2_is_path_valid_condition_bt_node
      - nav2_initial_pose_received_condition_bt_node
      - nav2_reinitialize_global_localization_service_bt_node
      - nav2_rate_controller_bt_node
      - nav2_distance_controller_bt_node
      - nav2_speed_controller_bt_node
      - nav2_truncate_path_action_bt_node
      - nav2_truncate_path_local_action_bt_node
      - nav2_goal_updater_node_bt_node
      - nav2_recovery_node_bt_node
      - nav2_pipeline_sequence_bt_node
      - nav2_round_robin_node_bt_node
      - nav2_transform_available_condition_bt_node
      - nav2_time_expired_condition_bt_node
      - nav2_path_expiring_timer_condition
      - nav2_distance_traveled_condition_bt_node
      - nav2_single_trigger_bt_node
      - nav2_goal_updated_controller_bt_node
      - nav2_is_battery_low_condition_bt_node
      - nav2_navigate_through_poses_action_bt_node
      - nav2_navigate_to_pose_action_bt_node
      - nav2_remove_passed_goals_action_bt_node
      - nav2_planner_selector_bt_node
      - nav2_controller_selector_bt_node
      - nav2_goal_checker_selector_bt_node
      - nav2_controller_cancel_bt_node
      - nav2_path_longer_on_approach_bt_node
      - nav2_wait_cancel_bt_node
      - nav2_spin_cancel_bt_node
      - nav2_back_up_cancel_bt_node
      - nav2_assisted_teleop_cancel_bt_node
      - nav2_drive_on_heading_cancel_bt_node
      - nav2_is_battery_charging_condition_bt_node
      # Coverage-specific BT plugins
      - opennav_compute_complete_coverage_action_bt_node
      - opennav_cancel_complete_coverage_action_bt_node

bt_navigator_navigate_through_poses_rclcpp_node:
  ros__parameters:
    use_sim_time: True

bt_navigator_navigate_to_pose_rclcpp_node:
  ros__parameters:
    use_sim_time: True

# Coverage navigator's rclcpp node
bt_navigator_navigate_complete_coverage_rclcpp_node:
  ros__parameters:
    use_sim_time: True

# Local Costmap
local_costmap:
  local_costmap:
    ros__parameters:
      always_send_full_costmap: False
      footprint_padding: 0.05 # cm
      global_frame: map
      robot_base_frame: base_link
      footprint: "[
        [0.306, 0.951],
        [0.306, -0.951],
        [-0.306, -0.951],
        [-0.306, 0.951]
      ]"
      height: 5 # m
      width: 5 # m
      origin_x: 0.0 # m
      origin_y: 0.0 # m
      resolution: 0.05 # m

      # robot_radius: 0.3
      rolling_window: True
      lethal_cost_threshold: 200
      track_unknown_space: False
      unknown_cost_value: 70
      trinary_costmap: False

      publish_frequency: 5.0
      update_frequency: 5.0
      transform_tolerance: 0.3
      initial_transform_timeout: 60.0
      use_maximum: False
      use_sim_time: True

      plugins: ["obstacle_layer", "denoise_layer", "inflation_layer"]

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        footprint_clearing_enabled: true
        max_obstacle_height: 5.0
        combination_method: 1
        observation_sources: scan
        scan:
          topic: /scan
          data_type: "LaserScan"
          min_obstacle_height: -5.0
          max_obstacle_height: 5.0
          inf_is_valid: True
          clearing: True
          marking: True
          obstacle_max_range: 5.0
          obstacle_min_range: 0.1
          raytrace_max_range: 5.5
          raytrace_min_range: 0.5

      denoise_layer:
        plugin: "nav2_costmap_2d::DenoiseLayer"
        enabled: true
        minimal_group_size: 5
        group_connectivity_type: 8

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        enabled: true
        inflation_radius: 0.2
        cost_scaling_factor: 15.0
        inflate_unknown: false
        inflate_around_unknown: false

# Global Costmap
global_costmap:
  global_costmap:
    ros__parameters:
      footprint_padding: 0.05
      rolling_window: True
      width: 25
      height: 25
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      footprint: "[
        [0.306, 0.951],
        [0.306, -0.951],
        [-0.306, -0.951],
        [-0.306, 0.951]
      ]"
      # robot_radius: 0.9
      resolution: 0.05
      plugins: ["obstacle_layer", "denoise_layer", "inflation_layer"]

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        footprint_clearing_enabled: true
        max_obstacle_height: 2.0
        combination_method: 1
        scan:
          topic: /scan
          obstacle_max_range: 3.0
          obstacle_min_range: 0.0
          raytrace_max_range: 3.5
          raytrace_min_range: 0.0
          max_obstacle_height: 2.0
          min_obstacle_height: 0.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          inf_is_valid: false

      denoise_layer:
        plugin: "nav2_costmap_2d::DenoiseLayer"
        enabled: True
        minimal_group_size: 2
        group_connectivity_type: 8

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        enabled: true
        inflation_radius: 0.2
        cost_scaling_factor: 15.0
        inflate_unknown: false
        inflate_around_unknown: true

      always_send_full_costmap: false
      introspection_mode: "disabled"

# Planner
planner_server:
  ros__parameters:
    expected_planner_frequency: 2.0
    action_server_timeout: 20.0
    use_sim_time: True
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_smac_planner/SmacPlannerHybrid" # Better for car-like robots
      downsample_costmap: false
      downsampling_factor: 1
      tolerance: 0.6
      allow_unknown: false
      max_iterations: 1000000
      max_on_approach_iterations: 1000
      max_planning_time: 5.0
      motion_model_for_search: "DUBIN"
      angle_quantization_bins: 32
      analytic_expansion_ratio: 3.5
      analytic_expansion_max_length: 3.0
      minimum_turning_radius: 0.4
      reverse_penalty: 2.0
      change_penalty: 0.0
      non_straight_penalty: 1.2
      cost_penalty: 2.0
      retrospective_penalty: 0.025
      lookup_table_size: 20.0
      cache_obstacle_heuristic: false
      debug_visualizations: true  # Enable for path debugging
      use_final_approach_orientation: false
      smooth_path: true

# Controller
controller_server:
  ros__parameters:
    use_sim_time: True
    controller_frequency: 10.0        # Reduced from 20.0 for stability
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.5            # Increased tolerance
    controller_patience: 15.0         # Significantly increased patience
    max_planning_retries: 10          # More retries
    odom_topic: "/odom"

    # Add these important parameters for path handling
    action_server_result_timeout: 300.0  # 5 minutes timeout
    transform_tolerance: 0.5             # More lenient transform tolerance

    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    # Progress checker - more lenient for coverage operations
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.3    # Increased from 0.2
      movement_time_allowance: 60.0    # Double the time allowance

    # Goal checker - appropriate for coverage precision
    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.5           # More tolerant
      yaw_goal_tolerance: 0.3          # More tolerant

    # Enhanced Pure Pursuit Controller
    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"

      # Reduce speed for more reliable path following
      desired_linear_vel: 0.3          # Reduced from 0.5
      lookahead_dist: 1.5              # Reduced from 2.0
      min_lookahead_dist: 0.8          # Reduced from 1.0
      max_lookahead_dist: 2.5          # Reduced from 3.0
      lookahead_time: 1.5              # Reduced from 2.0

      # More conservative rotation
      rotate_to_heading_angular_vel: 0.5  # Reduced from 0.8
      use_rotate_to_heading: true
      rotate_to_heading_min_angle: 0.785  # ~45 degrees (less frequent)
      max_angular_accel: 1.0              # Reduced from 1.5
      max_angular_velocity: 0.8           # Reduced from 1.0

      # Enhanced collision detection
      use_collision_detection: true
      max_allowed_time_to_collision_up_to_carrot: 3.0  # Increased

      # Better path handling for complex coverage paths
      use_interpolation: true
      use_path_orientations: true
      max_robot_pose_search_dist: 10.0    # Increased for large fields

      # Transform handling
      transform_tolerance: 0.5            # Match controller server

      # Velocity scaling for smooth operation
      use_velocity_scaled_lookahead_dist: true
      min_approach_linear_velocity: 0.05   # Lower minimum
      approach_velocity_scaling_dist: 2.0

      use_regulated_linear_velocity_scaling: true
      use_cost_regulated_linear_velocity_scaling: false  # Disable for simpler operation
      regulated_linear_scaling_min_radius: 2.0
      regulated_linear_scaling_min_speed: 0.1

      # Coverage-specific
      allow_reversing: false
      cost_scaling_factor: 2.0
      use_approach_vel_scaling: true

smoother_server:
  ros__parameters:
    use_sim_time: True
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: True

behavior_server:
  ros__parameters:
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"
    assisted_teleop:
      plugin: "nav2_behaviors/AssistedTeleop"
    global_frame: odom
    robot_base_frame: base_link
    transform_tolerance: 0.1
    use_sim_time: true
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0
    min_rotational_vel: 0.4
    rotational_acc_lim: 3.2

waypoint_follower:
  ros__parameters:
    use_sim_time: True
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 200

velocity_smoother:
  ros__parameters:
    use_sim_time: True
    smoothing_frequency: 20.0
    scale_velocities: False
    feedback: "OPEN_LOOP"
    max_velocity: [0.26, 0.0, 1.0]
    min_velocity: [-0.26, 0.0, -1.0]
    max_accel: [2.5, 0.0, 3.2]
    max_decel: [-2.5, 0.0, -3.2]
    odom_topic: "/odom"
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0